trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  imageName: number-to-word
  acrServiceConnection: ACR-Service-Connection
  acrLoginServer: aksregistryname.azurecr.io
  tag: $(Build.BuildId)

stages:

# =========================
# STAGE 1: BUILD (CI)
# =========================
- stage: Build
  displayName: Build and Push Docker Image
  jobs:
  - job: BuildJob
    steps:

    - task: Docker@2
      displayName: Build and Push Image
      inputs:
        command: buildAndPush
        containerRegistry: 'projectserviceconnection'
        repository: $(imageName)
        Dockerfile: Dockerfile
        tags: |
          $(tag)
          latest


# =========================
# STAGE 2: DEPLOY (CD)
# =========================
- stage: Deploy
  displayName: Deploy to AKS using Helm
  dependsOn: Build
  condition: succeeded()

  jobs:
  - job: DeployJob
    steps:

    - task: HelmInstaller@1
      inputs:
        helmVersionToInstall: 'latest'

    - task: HelmDeploy@0
      displayName: Deploy Helm Chart
      inputs:
        connectionType: 'Aksserviceconnection'
        azureSubscription: 'Aksserviceconnection'
        azureResourceGroup: 'Aks_resourcegroup'
        kubernetesCluster: 'webapp_akscluster'
        command: upgrade
        chartType: FilePath
        chartPath: './number-to-word'
        releaseName: number-to-word
        install: true
        arguments: >
          --set image.tag=$(tag)